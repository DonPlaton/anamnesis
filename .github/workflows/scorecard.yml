# OpenSSF Scorecard: an automated supply-chain / security-hygiene score (branch
# protection, pinned actions, token permissions, dangerous workflow patterns, and more).
# Results post to the repo Security tab and to the public Scorecard API, which backs the
# README badge. Runs weekly and when branch protection changes.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "18 5 * * 2"   # weekly, Tuesday 05:18 UTC
  push:
    branches: [master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload the SARIF result to the Security tab
      id-token: write          # publish the result to the public Scorecard API (for the badge)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
